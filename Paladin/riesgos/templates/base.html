<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}Paladin{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/lux/bootstrap.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">🛡️ Paladin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard' %}">Panel</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'lista_activos' %}">Activos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'lista_riesgos' %}">Riesgos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'lista_amenazas' %}">Amenazas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'lista_vulnerabilidades' %}">Vulnerabilidades</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'lista_controles' %}">Controles</a>
            </li>
          </ul>
          <a class="btn btn-light btn-sm fw-semibold" href="{% url 'reporte' %}">📄 Reporte</a>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      {% block contenido %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — Paladin</title>
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/lux/bootstrap.min.css" />
  </head>
  <body class="bg-light">
    <div class="container" style="max-width: 420px; margin-top: 8vh;">
      <div class="text-center mb-4">
        <h1 class="h3">🛡️ Paladin</h1>
        <p class="text-muted">Gestión de activos y riesgos cibernéticos</p>
      </div>
      <div class="card shadow-sm">
        <div class="card-header"><h5 class="mb-0">Iniciar sesión</h5></div>
        <div class="card-body">
          {% if form.errors %}
            <div class="alert alert-danger">
              Usuario o contraseña incorrectos. Inténtalo de nuevo.
            </div>
          {% endif %}

          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
          </form>
        </div>
        <div class="card-footer text-center">
          ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
        </div>
      </div>
    </div>
  </body>
</html>
